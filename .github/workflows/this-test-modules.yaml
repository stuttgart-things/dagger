---
name: Test Changed Modules
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - feature/*
      - fix/*

# For every module touched in the PR/push, runs:
#   1. `dagger functions -m ./<module>` — catches schema/flag regressions
#      (e.g. in-module flag-name collisions) before release. (#262 P2.1)
#   2. `dagger develop` + `golangci-lint` — surfaces lint failures using
#      the repo-wide .golangci.yml. (#262 P2.3)

permissions:
  contents: read

jobs:
  detect-modules:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed modules
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git fetch --no-tags origin "$BASE_REF"
            base="origin/${BASE_REF}"
            range="${base}...HEAD"
          else
            # Push event. If the "before" SHA is unknown (force push,
            # first push, etc.) fall back to the last commit only.
            if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]] \
              || ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
              range="HEAD~1...HEAD"
            else
              range="${BEFORE_SHA}...${HEAD_SHA}"
            fi
          fi

          echo "Diff range: $range"
          changed_files=$(git diff --name-only "$range" || true)
          echo "Changed files:"
          echo "$changed_files"

          modules=()
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            top="${path%%/*}"
            [[ "$top" == "$path" ]] && continue  # top-level file, not a module dir
            [[ -f "${top}/dagger.json" ]] || continue
            modules+=("$top")
          done < <(printf '%s\n' "$changed_files")

          # Dedup, preserve sort order
          if [[ ${#modules[@]} -gt 0 ]]; then
            mapfile -t modules < <(printf '%s\n' "${modules[@]}" | sort -u)
          fi

          count=${#modules[@]}
          if [[ $count -eq 0 ]]; then
            json="[]"
          else
            json=$(printf '%s\n' "${modules[@]}" | jq -R . | jq -sc .)
          fi

          echo "Changed modules ($count): $json"
          echo "modules=$json" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

  test-modules:
    name: test (${{ matrix.module }})
    needs: detect-modules
    if: needs.detect-modules.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect-modules.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Install Dagger CLI
        env:
          DAGGER_VERSION: 0.20.8
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | BIN_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/dagger" version

      - name: dagger functions -m ./${{ matrix.module }}
        run: dagger functions -m "./${{ matrix.module }}"

      # `dagger develop` regenerates dagger.gen.go + internal/* (both
      # gitignored) so golangci-lint can typecheck the module.
      # `only-new-issues` grandfathers pre-existing tech debt; PRs
      # only fail on issues introduced by the diff vs main.
      - name: dagger develop -m ./${{ matrix.module }}
        run: dagger develop -m "./${{ matrix.module }}"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}
          args: --config=${{ github.workspace }}/.golangci.yml
          only-new-issues: true
