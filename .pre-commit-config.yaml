repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-symlinks
      #- id: check-yaml
      - id: detect-private-key
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0  # or specific git tag
    hooks:
      - id: shellcheck
        args:
          - "-e"
          - "SC1090"
          - "-e"
          - "SC1091"
  # hadolint via the on-PATH static binary (bundled in the linting module's
  # image, see linting/container.go). The upstream hadolint/hadolint hook ids
  # (`hadolint`, `hadolint-docker`) are both Docker-based — `hadolint-docker`
  # needs a daemon that doesn't exist inside a Dagger container. A repo: local
  # system hook runs the native binary instead. See #302.
  - repo: local
    hooks:
      - id: hadolint
        name: Lint Dockerfiles with hadolint
        entry: hadolint
        language: system
        types: [dockerfile]
        # tests/linting/dockerfile/invalid/ is a deliberately-broken regression
        # fixture for the linting module's own tests; don't fail the repo gate on it.
        exclude: ^tests/linting/dockerfile/invalid/
        args:
          - --ignore
          - DL4006
          - --ignore
          - DL3015
          - --ignore
          - DL3007
  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.30.0
    hooks:
      - id: check-github-workflows

  # Per-module Go lint. Requires the dagger-generated SDK (dagger.gen.go,
  # internal/dagger, ...) to be present in each touched module — run
  # `dagger develop` in the module first. Gated to the `manual` stage so
  # default `pre-commit run` doesn't fail on a fresh clone; invoke with:
  #   pre-commit run --hook-stage manual golangci-lint --files <module>/...
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint
        stages: [manual]
        args: ["--config=.golangci.yml"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        description: Detects high entropy strings that are likely to be passwords.
        entry: detect-secrets-hook
        language: python
        # for backward compatibility
        files: .*  # all files
        args: ["--exclude-files", "git/dagger.json|tests/vm/terraform.tfvars.enc.json|repository-linting/dagger.json",
               "--exclude-files", "ansible/dagger.json",
               "--exclude-files", "argocd/dagger.json",
               "--exclude-files", "go/dagger.json",
               "--exclude-files", hugo/dagger.json",
               "--exclude-files", "tests/sops/tfvars.json",
               "--exclude-files", "hugo/dagger.gen.go"
               ]
