---
version: 3
vars:
  PROJECT_NAME:
    sh: echo ${PWD##*/}
  BRANCH:
    sh: if [ $(git rev-parse --abbrev-ref HEAD) != "main" ]; then echo $(git rev-parse --abbrev-ref HEAD); else echo main ; fi
includes:
  git:
    taskfile: https://raw.githubusercontent.com/stuttgart-things/platform-engineering-showcase/refs/heads/main/taskfiles/git.yaml

dotenv: ['.env', '{{.HOME}}/.env']

tasks:
  create:
    desc: Create new dagger module
    cmds:
      - dagger init --sdk={{ .SDK }} --source=./{{ .MODULE_NAME }} --name={{ .MODULE_NAME }}
      - jq '.source = "."' dagger.json > tmp.json && mv tmp.json dagger.json
      - mv dagger.json ./{{ .MODULE_NAME }}/dagger.json
    vars:
      MODULE_NAME:
        sh: gum input --placeholder "Module name"
      SDK:
        sh: gum choose "go" "python"

  test:
    desc: Select test to run
    cmds:
      - |
        totest=$(gum choose "ansible" "argocd" "go" "helm" "crossplane" "kcl" "oci")
        echo "Selected: ${totest}"
        task test-${totest}

  install-cli:
    desc: Install Dagger CLI
    cmds:
      - |
        curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR={{ .BIN_DIR }} sudo -E sh
    vars:
      BIN_DIR:
        sh: gum choose "/usr/bin" "/usr/local/bin"

  release:
    desc: push new version
    cmds:
      - task: test-go
      - task: test-helm
      - task: test-ansible
      - task: test-argocd
      - task: test-docker
      - task: test-hugo
      - task: test-linting
      - task: test-homerun
      - task: test-terraform
      - task: test-templating
      - task: test-python
      - task: test-oci
      - task: git:pr
      - semantic-release --dry-run
      - semantic-release --debug --no-ci
      - echo released version $(git describe --tags --abbrev=0)

  test-linting:
    desc: Test linting functions
    cmds:
      - |
        dagger call -m linting \
        lint-yaml --src {{ .YAML_TEST_DIR }} \
        export --path={{ .LINT_REPORT_PATH }}
      - |
        dagger call -m linting \
        lint-markdown --src {{ .MARKDOWN_TEST_DIR }} \
        export --path={{ .MARKDOWN_REPORT_PATH }}
      - |
        dagger call -m linting \
        run-pre-commit --src "{{ .PRE_COMMIT_SRC }}" \
        --skip-hooks="{{ .PRE_COMMIT_SKIP_HOOKS }}" \
        export --path="{{ .PRE_COMMIT_REPORT_PATH }}"
    vars:
      YAML_TEST_DIR: tests/linting/yaml/
      LINT_REPORT_PATH: /tmp/report.yaml
      MARKDOWN_TEST_DIR: tests/linting/markdown/
      MARKDOWN_REPORT_PATH: /tmp/markdown-report.yaml
      PRE_COMMIT_REPORT_PATH: /tmp/pre-commit-report.txt
      PRE_COMMIT_SKIP_HOOKS: hadolint-docker
      PRE_COMMIT_SRC: "./"

  test-templating:
    desc: Test templating functions
    cmds:
      - |
        dagger call -m {{ .MODULE }} render \
        --src={{ .TEST_TEMPLATING_SRC }} \
        --templates="{{ .TEMPLATES }}" \
        --variables="{{ .VARIABLES }}" \
        --variables-file={{ .VARIABLES_FILE }} \
        export --path={{ .OUTPUT_DIR }}
      - |
        dagger call -m {{ .MODULE }} render-from-file \
        --src {{ .TEST_TEMPLATING_SRC }} \
        --templates {{ .RENDER_FROM_FILE_TEMPLATES }} \
        --data-file {{ .RENDER_FROM_FILE_DATA }} \
        export --path {{ .RENDER_FROM_FILE_OUTPUT }}
    vars:
      MODULE: templating
      TEST_TEMPLATING_SRC: tests/templating
      TEMPLATES: "config-string.yaml.tmpl,deployment.yaml.tmpl,service.yaml.tmpl"
      VARIABLES: "name=myapp,namespace=default,version=1.0.0,replicas=3,image=nginx,port=8080,serviceType=ClusterIP,debug=false"
      VARIABLES_FILE: example-vars.yaml
      OUTPUT_DIR: /tmp/templating
      RENDER_FROM_FILE_TEMPLATES: config.yaml.tmpl
      RENDER_FROM_FILE_DATA: data.yaml
      RENDER_FROM_FILE_OUTPUT: ./output

  test-packer:
    desc: Test packer functions
    cmds:
      - |
        # BASIC HELLO BUILD
        dagger call -m {{ .MODULE }} bake \
        --local-dir "." \
        --build-path {{ .TEST_HELLO }} \
        --progress plain
      - |
        # VARS (COMMA-SEPARATED CLI)
        dagger call -m {{ .MODULE }} bake \
        --local-dir "." \
        --build-path {{ .TEST_VARS_TEMPLATE }} \
        --vars "{{ .TEST_VARS_CLI }}" \
        --progress plain
      - |
        # VARS FILE (PLAIN YAML)
        dagger call -m {{ .MODULE }} bake \
        --local-dir "." \
        --build-path {{ .TEST_VARS_TEMPLATE }} \
        --vars-file {{ .TEST_VARS_FILE }} \
        --progress plain
      - |
        # VARS FILE + SOPS FILE + CLI OVERRIDE
        # REQUIRES: SOPS_AGE_KEY env var AND tests/packer/vars/secrets.enc.yaml
        if [ -f tests/packer/vars/secrets.enc.yaml ] && [ -n "${SOPS_AGE_KEY}" ]; then
          dagger call -m {{ .MODULE }} bake \
          --local-dir "." \
          --build-path {{ .TEST_VARS_TEMPLATE }} \
          --vars-file {{ .TEST_VARS_FILE }} \
          --sops-file {{ .TEST_SOPS_FILE }} \
          --sops-age-key env:SOPS_AGE_KEY \
          --vars "{{ .TEST_VARS_OVERRIDE }}" \
          --progress plain
        else
          echo "SKIP: sops test (missing secrets.enc.yaml or SOPS_AGE_KEY)"
        fi
    vars:
      MODULE: packer
      TEST_HELLO: tests/packer/hello/hello.pkr.hcl
      TEST_VARS_TEMPLATE: tests/packer/vars/template.pkr.hcl
      TEST_VARS_FILE: vars.yaml
      TEST_SOPS_FILE: secrets.enc.yaml
      TEST_VARS_CLI: "name=from-cli,environment=ci,owner=dagger"
      TEST_VARS_OVERRIDE: "environment=prod"

  test-argocd:
    desc: Test argocd KCL-render functions (no cluster needed)
    cmds:
      - |
        rm -rf {{ .OUTPUT_DIR }} && mkdir -p {{ .OUTPUT_DIR }}
      - |
        echo "Rendering AppProject from YAML..."
        dagger call -m ./{{ .MODULE }} \
        create-app-project \
        --parameters-file {{ .APPPROJECT_PARAMS }} \
        --progress plain \
        export --path {{ .OUTPUT_DIR }}/appproject
        echo "=== AppProject ==="
        cat {{ .OUTPUT_DIR }}/appproject/*.yaml
      - |
        echo "Rendering Application from YAML..."
        dagger call -m ./{{ .MODULE }} \
        create-application \
        --parameters-file {{ .APPLICATION_PARAMS }} \
        --progress plain \
        export --path {{ .OUTPUT_DIR }}/application
        echo "=== Application ==="
        cat {{ .OUTPUT_DIR }}/application/*.yaml
      - |
        echo "Rendering ApplicationSet from YAML..."
        dagger call -m ./{{ .MODULE }} \
        create-application-set \
        --parameters-file {{ .APPLICATIONSET_PARAMS }} \
        --progress plain \
        export --path {{ .OUTPUT_DIR }}/applicationset
        echo "=== ApplicationSet ==="
        cat {{ .OUTPUT_DIR }}/applicationset/*.yaml
      - |
        echo "Rendering Application with YAML + CLI override (expect name/dest-namespace overridden)..."
        dagger call -m ./{{ .MODULE }} \
        create-application \
        --parameters-file {{ .APPLICATION_PARAMS }} \
        --name xplane-test-guestbook-dev \
        --dest-namespace guestbook-dev \
        --progress plain \
        export --path {{ .OUTPUT_DIR }}/application-override
        echo "=== Application (override) ==="
        cat {{ .OUTPUT_DIR }}/application-override/*.yaml
    vars:
      MODULE: argocd
      APPPROJECT_PARAMS: tests/argocd/appproject-xplane-test.yaml
      APPLICATION_PARAMS: tests/argocd/application-xplane-test-guestbook.yaml
      APPLICATIONSET_PARAMS: tests/argocd/applicationset-multi-cluster-guestbook.yaml
      OUTPUT_DIR: /tmp/dagger/argocd

  test-kcl:
    desc: Test KCL functions
    cmds:
      - |
        echo "Testing KCL version..."
        dagger call -m {{ .MODULE }} \
        kcl-version \
        --progress plain
      - |
        echo "Testing KCL basic functionality..."
        dagger call -m {{ .MODULE }} \
        test-kcl \
        --progress plain
      - |
        echo "Testing KCL with project files..."
        dagger call -m {{ .MODULE }} \
        run \
        --source {{ .TEST_KCL_PROJECT }} \
        --entrypoint {{ .TEST_KCL_ENTRYPOINT }} \
        --progress plain
      - |
        echo "Testing KCL validation..."
        dagger call -m {{ .MODULE }} \
        validate-kcl \
        --source {{ .TEST_KCL_PROJECT }} \
        --progress plain
      - |
        echo "Testing CRD conversion with local file..."
        dagger call -m {{ .MODULE }} \
        convert-crd \
        --crd-file {{ .TEST_CRD_FILE }} \
        --progress plain \
        export --path={{ .OUTPUT_MODELS_DIR }}
        echo "Generated CRD models:"
        find {{ .OUTPUT_MODELS_DIR }} -name "*.k" -exec basename {} \;
      - |
        echo "Testing kustomize base rendering..."
        dagger call -m {{ .MODULE }} \
        render-kustomize-base \
        --source {{ .TEST_KUSTOMIZE_PROJECT }} \
        --parameters-file {{ .TEST_KUSTOMIZE_PARAMS }} \
        --progress plain \
        export --path={{ .OUTPUT_KUSTOMIZE_DIR }}
        echo "Generated kustomize base:"
        ls {{ .OUTPUT_KUSTOMIZE_DIR }}/
    vars:
      MODULE: kcl
      TEST_KCL_PROJECT: tests/kcl/test-kcl-project
      TEST_KCL_ENTRYPOINT: main.k
      TEST_CRD_FILE: tests/kcl/test-crd.yaml
      OUTPUT_MODELS_DIR: /tmp/dagger/kcl-test-models
      TEST_KUSTOMIZE_PROJECT: tests/kcl/test-kustomize-project
      TEST_KUSTOMIZE_PARAMS: tests/kcl/test-kustomize-project/params.yaml
      OUTPUT_KUSTOMIZE_DIR: /tmp/dagger/kcl-test-kustomize-base

  test-kcl-kustomize:
    desc: Test KCL kustomize base rendering
    cmds:
      - |
        echo "Testing kustomize base rendering..."
        dagger call -m {{ .MODULE }} \
        render-kustomize-base \
        --source {{ .TEST_KUSTOMIZE_PROJECT }} \
        --parameters-file {{ .TEST_KUSTOMIZE_PARAMS }} \
        --progress plain \
        export --path={{ .OUTPUT_KUSTOMIZE_DIR }}

        echo ""
        echo "Generated kustomize base:"
        ls -la {{ .OUTPUT_KUSTOMIZE_DIR }}/

        echo ""
        echo "kustomization.yaml:"
        cat {{ .OUTPUT_KUSTOMIZE_DIR }}/kustomization.yaml

        echo ""
        echo "All resource files:"
        for f in {{ .OUTPUT_KUSTOMIZE_DIR }}/*.yaml; do
          BASENAME=$(basename "$f")
          if [ "$BASENAME" != "kustomization.yaml" ]; then
            echo "--- $BASENAME ---"
            cat "$f"
            echo ""
          fi
        done
    vars:
      MODULE: kcl
      TEST_KUSTOMIZE_PROJECT: tests/kcl/test-kustomize-project
      TEST_KUSTOMIZE_PARAMS: tests/kcl/test-kustomize-project/params.yaml
      OUTPUT_KUSTOMIZE_DIR: /tmp/dagger/kcl-test-kustomize-base

  render-kustomize-base:
    desc: Render kustomize base from KCL source
    cmds:
      - |
        echo "Rendering kustomize base..."
        echo "Source: {{ .SOURCE }}"
        echo "Profile: {{ .PROFILE }}"
        echo "Output: {{ .OUTPUT }}"
        echo ""

        dagger call -m {{ .MODULE }} \
        render-kustomize-base \
        --source "{{ .SOURCE }}" \
        --parameters-file="{{ .PROFILE }}" \
        --progress plain \
        export --path="{{ .OUTPUT }}"

        echo ""
        echo "Kustomize base rendered:"
        ls -la "{{ .OUTPUT }}/"
    vars:
      MODULE: kcl
      SOURCE: '{{ .SOURCE | default "tests/kcl/test-kustomize-project" }}'
      PROFILE: '{{ .PROFILE | default "tests/kcl/test-kustomize-project/params.yaml" }}'
      OUTPUT: '{{ .OUTPUT | default "/tmp/dagger/kcl-kustomize-base" }}'

  convert-crd:
    desc: Convert CRD to KCL models using web source or local file
    cmds:
      - |
        echo "Converting CRD to KCL models..."
        if [ -n "{{ .CRD_URL }}" ]; then
          echo "Using web source: {{ .CRD_URL }}"
          dagger call -m {{ .MODULE }} \
          convert-crd \
          --crd-source "{{ .CRD_URL }}" \
          --progress plain \
          export --path={{ .OUTPUT_MODELS_DIR }}
        elif [ -n "{{ .CRD_FILE }}" ]; then
          echo "Using local file: {{ .CRD_FILE }}"
          dagger call -m {{ .MODULE }} \
          convert-crd \
          --crd-file {{ .CRD_FILE }} \
          --progress plain \
          export --path={{ .OUTPUT_MODELS_DIR }}
        else
          echo "Error: Please provide either CRD_URL or CRD_FILE"
          echo "Usage examples:"
          echo "  task convert-crd CRD_URL=https://raw.githubusercontent.com/crossplane-contrib/provider-terraform/main/package/crds/tf.upbound.io_workspaces.yaml"
          echo "  task convert-crd CRD_FILE=./my-crd.yaml"
          exit 1
        fi
        echo "Generated models available in: {{ .OUTPUT_MODELS_DIR }}"
        ls -la {{ .OUTPUT_MODELS_DIR }}
    vars:
      MODULE: kcl
      OUTPUT_MODELS_DIR: /tmp/dagger/kcl-models

  test-ansible:
    desc: Test ansible functions
    cmds:
      - |
        dagger call -m {{ .MODULE }} execute \
        --src . \
        --playbooks tests/ansible/hello.yaml,tests/ansible/hello2.yaml \
        -vv --progress plain

      - |
        rm -rf {{ .OUTPUT_COLLECTION_FOLDER }} || true
        dagger call -m ./{{ .MODULE }} run-collection-build-pipeline \
        --src {{ .TEST_ANSIBLE_CODE }} \
        --progress plain export \
        --path={{ .OUTPUT_COLLECTION_FOLDER }}
        ls -lta {{ .OUTPUT_COLLECTION_FOLDER }}
    vars:
      TEST_ANSIBLE_CODE: tests/ansible/collection # tests/ansible/collection #tests
      MODULE: ansible
      OUTPUT_COLLECTION_FOLDER: /tmp/dagger/ansible

  test-terraform:
    desc: Test terraform functions
    cmds:
      - |
        dagger call -m {{ .MODULE }} \
        version \
        -vv --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        execute \
        --terraform-dir {{ .TEST_TERRAFORM_CODE }} \
        --operation apply \
        -vv --progress plain \
        export --path={{ .OUTPUT_STATE_FOLDER }}
      - |
        dagger call -m {{ .MODULE }} \
        output \
        --terraform-dir {{ .TEST_TERRAFORM_CODE }} \
        -vv --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        execute --operation destroy \
        --terraform-dir {{ .OUTPUT_STATE_FOLDER }} \
        -vv --progress plain
    vars:
      TEST_TERRAFORM_CODE: tests/terraform
      MODULE: terraform
      OUTPUT_STATE_FOLDER: /tmp/dagger/{{ .MODULE }}

  test-kyverno:
    desc: Test Kyverno
    cmds:
      - |
        dagger call -m kyverno validate \
        --policy {{ .TEST_KYVERNO_POLICY }} \
        --resource {{ .TEST_KYVERNO_RESOURCE }} \
        -vv --progress plain
    vars:
      MODULE: kyverno
      TEST_KYVERNO_POLICY: tests/kyverno/policies/
      TEST_KYVERNO_RESOURCE: tests/kyverno/resource-good/

  test-hugo:
    desc: Test hugo
    cmds:
      - |
        # CLEANUP OUTPUT FOLDER
        rm -rf {{ .OUTPUT_HUGO_FOLDER }} || true

        # INIT SITE
        dagger call -m {{ .MODULE }} \
        init-site --name {{ .NAME }} \
        --config {{ .TEST_HUGO_CONFIG }} \
        --content {{ .TEST_HUGO_CONTENT }} \
        export \
        --path {{ .OUTPUT_HUGO_FOLDER }} -vvv
      - |
        # CLEANUP STATIC CONTENT
        rm -rf {{ .OUTPUT_HUGO_STATIC_CONTENT }} || true

        # INIT SITE & EXPORT STAIC CONTENT
        dagger call -m {{ .MODULE }} \
        build-and-export \
        --name {{ .NAME }} \
        --config {{ .TEST_HUGO_CONFIG }} \
        --content {{ .TEST_HUGO_CONTENT }} \
        export \
        --path {{ .OUTPUT_HUGO_STATIC_CONTENT }}  -vvv
      - |
        # TEST MARKDOWN MERGE
        dagger call -m {{ .MODULE }} \
        merge-markdowns \
        --src={{ .TEST_HUGO_MERGE_DIR }} \
        --presentation-file={{ .TEST_HUGO_MERGE_PRESENTATION }} \
        export --path={{ .OUTPUT_HUGO_MERGE }}
        echo "✅ Merged markdown: {{ .OUTPUT_HUGO_MERGE }}"
        cat {{ .OUTPUT_HUGO_MERGE }}
    vars:
      NAME: presentation
      MODULE: hugo
      TEST_HUGO_CONFIG: tests/hugo/hugo.toml
      TEST_HUGO_CONTENT: tests/hugo/content
      TEST_HUGO_MERGE_DIR: tests/hugo/merge
      TEST_HUGO_MERGE_PRESENTATION: tests/hugo/merge/presentation.yaml
      OUTPUT_HUGO_FOLDER: /tmp/dagger/hugo
      OUTPUT_HUGO_STATIC_CONTENT: /tmp/dagger/hugo/{{ .NAME }}/static
      OUTPUT_HUGO_MERGE: /tmp/merged.md

  test-oci:
    desc: Test OCI functions (uses local zot registry, no credentials needed)
    cmds:
      - |
        echo "Testing push-artifact with local zot registry..."
        dagger call -m {{ .MODULE }} \
        test-push-artifact \
        --progress plain
      - |
        echo "Testing push-artifacts with local zot registry..."
        dagger call -m {{ .MODULE }} \
        test-push-artifacts \
        --progress plain
    vars:
      MODULE: oci

  test-crossplane:
    desc: Test crossplame functions
    cmds:
      - dagger call -m ./{{ .MODULE }} init-package --name test --progress plain export --path={{ .OUTPUT_DIR }}
      - dagger call -m ./{{ .MODULE }} package --src {{ .TEST_PACKAGE }} --progress plain export --path={{ .OUTPUT_DIR_PACKAGE }}
      #- dagger call -m ./{{ .MODULE }} init-custom-package --name {{ .NEW_MODULE_KIND }} --progress plain export --path={{ .OUTPUT_DIR_PACKAGE }}
      - dagger call -m ./{{ .MODULE }} push --src {{ .TEST_PACKAGE }} --progress plain --username stuttgart-things --password=env:GITHUB_TOKEN --registry {{ .PACKAGE_REGISTRY }} --destination {{ .DESTINATION }}/{{ .PACKAGE_NAME }}:{{ .TAG }}
    vars:
      MODULE: crossplane
      TEST_PACKAGE: tests/registry
      OUTPUT_DIR: /tmp/crossplane
      NEW_MODULE_KIND: test
      OUTPUT_DIR_PACKAGE: "/tmp/crossplane/{{ .NEW_MODULE_KIND }}"
      PACKAGE_REGISTRY: ghcr.io
      DESTINATION: "{{ .PACKAGE_REGISTRY }}/stuttgart-things/stuttgart-things"
      PACKAGE_NAME: xplane-registry
      TAG: 2.2.7

  test-go:
    desc: Test go functions
    cmds:
      - dagger call -m ./{{ .MODULE }} lint --src {{ .TEST_GO_CODE }} --timeout 300s --progress plain || true
      - dagger call -m ./{{ .MODULE }} build-binary --src {{ .TEST_GO_CODE }} --goMainFile main.go --binName calc --progress plain export --path={{ .OUTPUT_DIR }} && ls -lta {{ .OUTPUT_DIR }} && rm -rf {{ .OUTPUT_DIR }}
      - dagger call -m ./{{ .MODULE }} ko-build --src {{ .TEST_GO_CODE }} --token=env:GITHUB_TOKEN --repo "{{ .KO_REPO }}" --ko-version {{ .KO_VERSION }} --push true --progress plain
      - dagger call -m ./{{ .MODULE }} security-scan --src {{ .TEST_GO_CODE }} --progress plain
    vars:
      MODULE: go
      TEST_GO_CODE: tests/go/calculator/
      OUTPUT_DIR: /tmp/calc
      KO_REPO: ttl.sh #ghcr.io/stuttgart-things/dagger
      KO_VERSION: 3979dd70544adde24d336d5b605f4cf6f0ea9479 # pragma: allowlist secret
      OUTPUT_GO_DIR: /tmp/go
      #TEST_IMG_TAR: test.tar
      WORKFLOW_REPORT: /tmp/workflow.json

  ko-build:
    desc: Build and push container with Ko (interactive)
    cmds:
      - |
        dagger call -m github.com/stuttgart-things/daggerverse/go@{{ .MODULE_VERSION }} ko-build \
        --src {{ .SRC }} \
        --token env:GITHUB_TOKEN \
        --repo {{ .REPO }} \
        --progress plain -vv
    vars:
      MODULE_VERSION:
        sh: gum input --placeholder "Module version/commit (e.g., latest commit hash)" --value "3979dd70544adde24d336d5b605f4cf6f0ea9479"
      SRC:
        sh: gum file --directory
      REPO:
        sh: gum input --placeholder "Container repository (e.g., ghcr.io/stuttgart-things/myapp)" --value "ghcr.io/stuttgart-things/myapp"

  test-helm:
    desc: Test helm functions
    cmds:
      - |
        dagger call -m {{ .MODULE }} \
        lint \
        --src {{ .TEST_CHART }} \
        -vv --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        render \
        --src {{ .TEST_CHART }} \
        --valuesFile {{ .TEST_VALUES }} \
        -vv --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        package \
        --src {{ .TEST_CHART }} \
        -vv --progress plain \
        export --path={{ .TEST_EXPORT }}
      - |
        dagger call -m {{ .MODULE }} \
        push \
        --src {{ .TEST_CHART }} \
        --registry {{ .PACKAGE_REGISTRY }} \
        --repository {{ .REPOSITORY }} \
        --username {{ .USERNAME }} \
        --password env:GITHUB_TOKEN \
        -vv --progress plain \
      - |
        dagger call -m {{ .MODULE }} \
        push \
        --src {{ .TEST_CHART }} \
        --registry {{ .PACKAGE_REGISTRY }} \
        --repository {{ .REPOSITORY }} \
        --username {{ .USERNAME }} \
        --password env:GITHUB_TOKEN \
        -vv --progress plain \
      - |
        dagger call -m {{ .MODULE }} \
        validate-chart \
        --src {{ .TEST_CHART }} \
        -vv --progress plain \
        export --path={{ .TEST_EXPORT_POLARIS }}
    vars:
      MODULE: helm
      TEST_CHART: tests/{{ .MODULE }}/test-chart/
      TEST_PACKAGE: tests/{{ .MODULE }}/chart.tgz
      TEST_VALUES: tests/{{ .MODULE }}/test-values.yaml
      TEST_EXPORT: /tmp/{{ .MODULE }}
      TEST_EXPORT_POLARIS: "/tmp/polaris.json"
      PACKAGE_REGISTRY: ghcr.io
      REPOSITORY: stuttgart-things
      USERNAME: patrick-hermann-sva

  test-gitlab:
    desc: Test gitlab functions
    cmds:
      - |
        dagger call -m {{ .MODULE }} list-projects \
        --server {{ .gitlab_server }} \
        --group-path {{ .gitlab_group_escaped }} \
        --token env:GITLAB_TOKEN \
        --progress plain
      - |
        dagger call -m {{ .MODULE }} get-project-id \
        --token env:GITLAB_TOKEN \
        --server {{ .gitlab_server }} \
        --project-name "{{ .gitlab_project }}" \
        --group-path "{{ .gitlab_group}}" \
        --progress plain
    vars:
      MODULE: gitlab

  test-docker:
    desc: Test docker module
    cmds:
      - |
        dagger call -m {{ .MODULE }} \
        build-and-push \
        --source {{ .SOURCE }} \
        --repository-name {{ .REPOSITORY_NAME }} \
        --registry-url {{ .REGISTRY_URL }} \
        --tag {{ .VERSION }} \
        --progress plain

        # dagger call -m {{ .MODULE }} \
        # mirror-apk-packages \
        # --source {{ .SOURCE }} \
        # --packages-file={{ .PACKAGES_FILE }} \
        # --progress plain
    vars:
      MODULE: docker
      SOURCE: tests/docker/
      PACKAGES_FILE: packages.yaml
      REPOSITORY_NAME: stuttgart-things/nginx-dagger
      REGISTRY_URL: ttl.sh
      VERSION: 1h

  test-homerun:
    desc: Test homerun module with Redis
    cmds:
      - |
        dagger call -m {{ .MODULE }} \
        run-test-with-redis \
        --source {{ .TEST_SOURCE }} \
        --test-path {{ .TEST_PATH }} \
        --go-version {{ .GO_VERSION }} \
        --redis-version {{ .REDIS_VERSION }} \
        --progress plain
    vars:
      MODULE: homerun
      TEST_SOURCE: tests/homerun/
      TEST_PATH: .
      GO_VERSION: "1.25.4"
      REDIS_VERSION: "7.2.0-v18"

  test-python:
    desc: Test python functions
    cmds:
      - |
        dagger call -m {{ .MODULE }} \
        lint --src {{ .TEST_PYTHON_CODE }} \
        --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        format-check --src {{ .TEST_PYTHON_CODE }} \
        --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        test --src {{ .TEST_PYTHON_CODE }} \
        --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        test-with-coverage --src {{ .TEST_PYTHON_CODE }} \
        --coverage-path src/ \
        --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        security-scan --src {{ .TEST_PYTHON_CODE }} \
        --scan-path src/ \
        --progress plain
      - |
        dagger call -m {{ .MODULE }} \
        build-image --src {{ .TEST_PYTHON_CODE }} \
        --progress plain
    vars:
      MODULE: python
      TEST_PYTHON_CODE: tests/python/

  run-redis:
    desc: Start Redis with dagger up (port forwarding)
    cmds:
      - |
        echo "Starting Redis on port {{ .PORT }}..."
        {{if .PASSWORD}}
        echo "Password: {{ .PASSWORD }}"
        dagger call -m {{ .MODULE }} \
        run-redis \
        --port {{ .PORT }} \
        --password "{{ .PASSWORD }}" \
        up --progress plain
        {{else}}
        echo "⚠️  WARNING: Starting Redis WITHOUT password (insecure!)"
        dagger call -m {{ .MODULE }} \
        run-redis \
        --port {{ .PORT }} \
        up --progress plain
        {{end}}
    vars:
      MODULE: homerun
      PORT: '{{.PORT | default "6379"}}'
      PASSWORD: '{{.PASSWORD | default ""}}'

  redis-cli:
    desc: Connect to Redis using redis-cli
    cmds:
      - |
        {{if .PASSWORD}}
        redis-cli -h {{ .HOST }} -p {{ .PORT }} -a "{{ .PASSWORD }}"
        {{else}}
        redis-cli -h {{ .HOST }} -p {{ .PORT }}
        {{end}}
    vars:
      HOST: '{{.HOST | default "localhost"}}'
      PORT: '{{.PORT | default "6379"}}'
      PASSWORD: '{{.PASSWORD | default ""}}'

  do:
    desc: Select a task to run
    cmds:
      - |
        # Extract task names (keep internal colons, remove only trailing colon)
        task_name=$(task -l | awk '/^\*/ {print $2}' | sed 's/:$//' | gum choose)

        # Run the selected task
        [ -n "$task_name" ] && task "$task_name"

  default:
    desc: Default task is select & do (work)
    cmds:
      - task do
