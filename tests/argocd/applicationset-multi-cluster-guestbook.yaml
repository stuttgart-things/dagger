name: multi-cluster-guestbook
namespace: argocd
generators:
  - list:
      elements:
        - cluster: dev
          url: https://1.2.3.4
          namespace: guestbook-dev
        - cluster: prod
          url: https://5.6.7.8
          namespace: guestbook-prod
templateName: "{{ .cluster }}-guestbook"
templateLabels:
  cluster: "{{ .cluster }}"
sources:
  - repoURL: https://github.com/argoproj/argocd-example-apps.git
    path: guestbook
    targetRevision: HEAD
destServer: "{{ .url }}"
destNamespace: "{{ .namespace }}"
syncOptions:
  - CreateNamespace=true
